minio:
  image:
    registry: docker.io
    repository: bitnami/minio
    tag: 2024-debian-12
  
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin123

  defaultBuckets: "uploads"

  persistence:
    enabled: true
    size: 10Gi
    ## THIS IS THE CRITICAL LINE to match the live cluster
    storageClass: "local-path" 

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi