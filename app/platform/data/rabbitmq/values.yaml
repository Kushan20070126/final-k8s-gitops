rabbitmq:
  image:
    registry: registry-1.docker.io
    repository: bitnamicharts/rabbitmq
    tag: 4.0-debian-12

  auth:
    username: admin
    password: admin123
    erlangCookie: "my-erlang-cookie-123456"

  persistence:
    enabled: true
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi