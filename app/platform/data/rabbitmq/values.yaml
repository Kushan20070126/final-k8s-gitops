global:
  security:
    allowInsecureImages: true

rabbitmq:
  image:
    registry: docker.io
    repository: bitnamilegacy/rabbitmq
    tag: 4.0.9-debian-12-r1

  auth:
    username: admin
    password: admin123
    securePassword: false
    updatePassword: true
    erlangCookie: "my-erlang-cookie-123456"

  persistence:
    enabled: true
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
