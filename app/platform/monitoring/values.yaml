kube-prometheus-stack:
  # Install Prometheus Operator CRDs so PrometheusRule/ServiceMonitor resources can be created.
  crds:
    enabled: true

  prometheusOperator:
    crds:
      enabled: true

  # ✅ Prometheus settings
  prometheus:
    prometheusSpec:
      retention: 2d
      replicas: 1

      # ✅ No PVC (ephemeral storage) for demos
      storageSpec: {}

      # ✅ Small single-node resource settings
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi

  # ✅ Grafana enabled
  grafana:
    enabled: true
    adminPassword: admin
    service:
      type: ClusterIP

  # ✅ Alertmanager disabled
  alertmanager:
    enabled: false
