nameOverride: "user-service"
fullnameOverride: "user-service"
replicaCount: 2

image:
  repository: "kushanrandika/user-service"
  tag: "v1.0.0"
  pullPolicy: IfNotPresent

containerPort: 8000
command: []
args: []

service:
  enabled: true
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  host: user.local
  path: /

config:
  DATABASE_URL: "postgresql://postgres:password@postgres-postgresql.database.svc.cluster.local:5432/ceylonstaydb"

secrets: {}

resources: {}
