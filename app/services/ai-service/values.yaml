nameOverride: "ai-service"
fullnameOverride: "ai-service"
replicaCount: 1

image:
  repository: "kushanrandika/ai-service"
  tag: "v1.0.0"
  pullPolicy: IfNotPresent

containerPort: 0
command:
  - "/bin/sh"
  - "-c"
args:
  - |
    export RABBITMQ_USER="${RABBITMQ_USER:-${RABBITMQ_USERNAME:-${RABBITMQ_DEFAULT_USER:-admin}}}"
    export RABBITMQ_USERNAME="${RABBITMQ_USERNAME:-${RABBITMQ_USER}}"
    export RABBITMQ_PASS="${RABBITMQ_PASS:-${RABBITMQ_PASSWORD:-${RABBITMQ_DEFAULT_PASS:-admin123}}}"
    export RABBITMQ_PASSWORD="${RABBITMQ_PASSWORD:-${RABBITMQ_PASS}}"
    export RABBITMQ_URL="${RABBITMQ_URL:-amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@${RABBITMQ_HOST}:${RABBITMQ_PORT}/%2F}"
    export AMQP_URL="${AMQP_URL:-${RABBITMQ_URL}}"
    export YOLO_CONFIG_DIR="${YOLO_CONFIG_DIR:-/tmp/Ultralytics}"
    mkdir -p "${YOLO_CONFIG_DIR}" "${YOLO_CONFIG_DIR}/Ultralytics" /tmp/Ultralytics || true
    chmod 0777 "${YOLO_CONFIG_DIR}" "${YOLO_CONFIG_DIR}/Ultralytics" /tmp/Ultralytics || true
    exec python app/worker.py

service:
  enabled: false
  type: ClusterIP
  port: 80

config:
  DB_DSN: "dbname=ceylonstaydb user=postgres password=postgres123 host=postgres-postgresql.database.svc.cluster.local port=5432"
  RABBITMQ_HOST: "rabbitmq.database.svc.cluster.local"
  RABBITMQ_PORT: "5672"
  RABBITMQ_URL: "amqp://admin:admin123@rabbitmq.database.svc.cluster.local:5672/%2F"
  AMQP_URL: "amqp://admin:admin123@rabbitmq.database.svc.cluster.local:5672/%2F"
  MINIO_ENDPOINT: "minio.database.svc.cluster.local:9000"
  RABBITMQ_USER: "admin"
  RABBITMQ_USERNAME: "admin"
  RABBITMQ_DEFAULT_USER: "admin"
  YOLO_CONFIG_DIR: "/tmp/Ultralytics"

secrets:
  MINIO_ACCESS: "minioadmin"
  MINIO_SECRET: "minioadmin123"
  RABBITMQ_PASS: "admin123"
  RABBITMQ_PASSWORD: "admin123"
  RABBITMQ_DEFAULT_PASS: "admin123"

resources: {}
