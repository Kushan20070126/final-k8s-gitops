apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wso2-apim
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Kushan20070126/final-k8s-gitops.git
    targetRevision: main
    path: charts/wso2-am-single
    helm:
      releaseName: wso2-apim
      parameters:
        - name: wso2.deployment.am.dockerRegistry
          value: docker.io/wso2
        - name: wso2.deployment.am.imageTag
          value: 4.3.0
        - name: wso2.deployment.am.livenessProbe.initialDelaySeconds
          value: "420"
        - name: wso2.deployment.am.readinessProbe.initialDelaySeconds
          value: "300"
        - name: wso2.deployment.dependencies.nfsServerProvisioner
          value: "false"
        - name: wso2.deployment.persistentRuntimeArtifacts.apacheSolrIndexing.enabled
          value: "false"
        - name: mysql-am.mysql.persistence.storageClass
          value: local-path
        - name: mysql-am.mysql.image
          value: mysql
        - name: mysql-am.mysql.imageTag
          value: "5.7"
        - name: wso2.deployment.am.ingress.management.hostname
          value: apim.tail97d15d.ts.net
        - name: wso2.deployment.am.ingress.gateway.hostname
          value: gateway.apim.tail97d15d.ts.net
        - name: wso2.deployment.am.ingress.websub.hostname
          value: websub.apim.tail97d15d.ts.net
        - name: wso2.deployment.am.ingress.websocket.hostname
          value: websocket.apim.tail97d15d.ts.net
        - name: wso2.deployment.am.ingress.className
          value: nginx
        - name: wso2.deployment.am.keyManager.external.enabled
          value: "true"
        - name: wso2.deployment.am.keyManager.external.serviceURL
          value: http://wso2-is-identity-server-http.wso2.svc.cluster.local:9763/services/
        - name: wso2.deployment.am.keyManager.external.username
          value: admin
        - name: wso2.deployment.am.keyManager.external.password
          value: admin
        - name: wso2.deployment.am.keyManager.external.idp.serverURL
          value: http://wso2-is-identity-server-http.wso2.svc.cluster.local:9763
        - name: wso2.deployment.am.keyManager.external.idp.authorizeEndpoint
          value: https://wso2is.tail97d15d.ts.net/oauth2/authorize
        - name: wso2.deployment.am.keyManager.external.idp.oidcLogoutEndpoint
          value: https://wso2is.tail97d15d.ts.net/oidc/logout
        - name: wso2.deployment.am.keyManager.external.idp.oidcCheckSessionEndpoint
          value: https://wso2is.tail97d15d.ts.net/oidc/checksession
  destination:
    server: https://kubernetes.default.svc
    namespace: apim
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
