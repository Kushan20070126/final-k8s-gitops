{{- if .Values.rabbitmqPatch.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "svc.fullname" . }}-rabbitmq-patch
data:
  rabbitmq.py: |
    import json
    import os
    import time
    import pika

    AI_QUEUE_NAME = "ai_queue"
    USER_EVENTS_QUEUE_NAME = "user_events_queue"
    NOTIFICATION_QUEUE_NAME = "notification_queue"


    def _retry_delay_seconds():
      raw_value = os.getenv("RABBITMQ_RETRY_DELAY_SECONDS", "5")
      try:
          return max(1, int(raw_value))
      except ValueError:
          return 5


    def _create_connection():
      host = os.getenv("RABBITMQ_HOST", "rabbitmq.database.svc.cluster.local")
      port = int(os.getenv("RABBITMQ_PORT", "5672"))
      user = (
          os.getenv("RABBITMQ_USER")
          or os.getenv("RABBITMQ_USERNAME")
          or os.getenv("RABBITMQ_DEFAULT_USER")
          or "admin"
      )
      password = (
          os.getenv("RABBITMQ_PASS")
          or os.getenv("RABBITMQ_PASSWORD")
          or os.getenv("RABBITMQ_DEFAULT_PASS")
          or "admin123"
      )
      vhost = os.getenv("RABBITMQ_VHOST", "/")

      credentials = pika.PlainCredentials(user, password)
      parameters = pika.ConnectionParameters(
          host=host,
          port=port,
          virtual_host=vhost,
          credentials=credentials,
      )
      return pika.BlockingConnection(parameters)


    def _publish(queue_name, message):
      connection = None
      try:
          connection = _create_connection()
          channel = connection.channel()
          channel.queue_declare(queue=queue_name, durable=True)
          channel.basic_publish(exchange="", routing_key=queue_name, body=message)
      except Exception as exc:
          print(f"RabbitMQ publish error for queue {queue_name}: {exc}")
      finally:
          if connection and connection.is_open:
              connection.close()


    def send_to_ai_queue(message_or_ad_id, uploaded_filenames=None, email=None):
      if uploaded_filenames is None and email is None:
          message = message_or_ad_id
      else:
          message = {
              "ad_id": message_or_ad_id,
              "uploaded_filenames": uploaded_filenames or [],
              "email": email,
          }

      if isinstance(message, (dict, list)):
          message = json.dumps(message)
      elif not isinstance(message, (str, bytes, bytearray)):
          message = str(message)

      _publish(AI_QUEUE_NAME, message)


    def send_notification_event(message=None, user_email=None, ad_id=None, **kwargs):
      if isinstance(message, dict) and user_email is None and ad_id is None and not kwargs:
          payload = message
      elif user_email is not None or ad_id is not None or kwargs:
          payload = {
              "user_email": user_email,
              "ad_id": ad_id,
              "message": message,
          }
          payload.update(kwargs)
      else:
          payload = message

      if isinstance(payload, (dict, list)):
          payload = json.dumps(payload)
      elif not isinstance(payload, (str, bytes, bytearray)):
          payload = str(payload)

      _publish(NOTIFICATION_QUEUE_NAME, payload)


    def consume_user_events(callback):
      retry_delay = _retry_delay_seconds()
      while True:
          connection = None
          try:
              connection = _create_connection()
              channel = connection.channel()
              channel.queue_declare(queue=USER_EVENTS_QUEUE_NAME, durable=True)
              channel.basic_consume(
                  queue=USER_EVENTS_QUEUE_NAME,
                  on_message_callback=callback,
                  auto_ack=True,
              )
              print("Listening for user events...")
              channel.start_consuming()
          except Exception as exc:
              print(
                  "Connection Error: Could not reach RabbitMQ at "
                  f"{os.getenv('RABBITMQ_HOST')}: {exc!r}. "
                  f"Retrying in {retry_delay}s..."
              )
              time.sleep(retry_delay)
          finally:
              if connection and connection.is_open:
                  connection.close()
{{- end }}
