apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "am-single-node.resource.prefix" . }}-am-deployment
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      deployment: {{ template "am-single-node.resource.prefix" . }}-am
      node: {{ template "am-single-node.resource.prefix" . }}-am
  template:
    metadata:
      annotations:
        checksum.am.conf: {{ include (print $.Template.BasePath "/am/instance/wso2am-single-node-am-conf.yaml") . | sha256sum }}
      labels:
        deployment: {{ template "am-single-node.resource.prefix" . }}-am
        node: {{ template "am-single-node.resource.prefix" . }}-am
        product: apim
    spec:
      initContainers:
        - name: init-db
          image: busybox:1.32
          command: ['sh', '-c', 'echo -e "Checking for the availability of DB Server deployment"; while ! nc -z "{{ .Values.wso2.deployment.am.db.hostname }}" {{ .Values.wso2.deployment.am.db.port }}; do sleep 1; printf "-"; done; echo -e "  >> DB Server has started";']
        {{ if .Values.wso2.deployment.am.db.autoMigrate.enabled }}
        - name: init-db-schema-migrations
          image: {{ .Values.wso2.deployment.am.db.autoMigrate.image }}
          command:
            - /bin/sh
            - "-c"
            - |
              set -e
              mysql -h "{{ .Values.wso2.deployment.am.db.hostname }}" \
                -P {{ .Values.wso2.deployment.am.db.port }} \
                -u "{{ .Values.wso2.deployment.am.db.apim.username }}" \
                -p"{{ .Values.wso2.deployment.am.db.apim.password }}" \
                WSO2AM_DB <<'SQL'
              CREATE TABLE IF NOT EXISTS AM_GATEWAY_POLICY_METADATA (
                GLOBAL_POLICY_MAPPING_UUID VARCHAR(45)   NOT NULL,
                DISPLAY_NAME               VARCHAR(255)  NULL,
                DESCRIPTION                VARCHAR(1023) NULL,
                ORGANIZATION               VARCHAR(100)  NOT NULL,
                PRIMARY KEY (GLOBAL_POLICY_MAPPING_UUID)
              )ENGINE INNODB;

              CREATE TABLE IF NOT EXISTS AM_GATEWAY_POLICY_MAPPING (
                POLICY_TO_FLOW_INFO_MAPPING_ID INTEGER AUTO_INCREMENT,
                GLOBAL_POLICY_MAPPING_UUID     VARCHAR(45)   NOT NULL,
                POLICY_UUID                    VARCHAR(45)   NOT NULL,
                POLICY_ORDER                   INTEGER       NOT NULL,
                DIRECTION                      VARCHAR(10)   NOT NULL,
                PARAMETERS                     VARCHAR(1024) NOT NULL,
                FOREIGN KEY (POLICY_UUID) REFERENCES AM_OPERATION_POLICY (POLICY_UUID) ON UPDATE CASCADE ON DELETE RESTRICT,
                FOREIGN KEY (GLOBAL_POLICY_MAPPING_UUID) REFERENCES AM_GATEWAY_POLICY_METADATA (GLOBAL_POLICY_MAPPING_UUID) ON UPDATE CASCADE ON DELETE CASCADE,
                PRIMARY KEY (POLICY_TO_FLOW_INFO_MAPPING_ID)
              )ENGINE INNODB;

              CREATE TABLE IF NOT EXISTS AM_GATEWAY_POLICY_DEPLOYMENT (
                GATEWAY_LABEL              VARCHAR(255) NOT NULL,
                GLOBAL_POLICY_MAPPING_UUID VARCHAR(45)  NOT NULL,
                ORGANIZATION               VARCHAR(100) NOT NULL,
                FOREIGN KEY (GLOBAL_POLICY_MAPPING_UUID) REFERENCES AM_GATEWAY_POLICY_METADATA (GLOBAL_POLICY_MAPPING_UUID) ON UPDATE CASCADE ON DELETE RESTRICT,
                PRIMARY KEY (ORGANIZATION, GATEWAY_LABEL)
              )ENGINE INNODB;

              CREATE TABLE IF NOT EXISTS AM_APP_REVOKED_EVENT (
                CONSUMER_KEY    VARCHAR(255)    NOT NULL,
                TIME_REVOKED    TIMESTAMP       NOT NULL,
                ORGANIZATION    VARCHAR(100),
                PRIMARY KEY (CONSUMER_KEY, ORGANIZATION)
              )ENGINE INNODB;

              CREATE TABLE IF NOT EXISTS AM_SUBJECT_ENTITY_REVOKED_EVENT (
                ENTITY_ID       VARCHAR(255)    NOT NULL,
                ENTITY_TYPE     VARCHAR(100)    NOT NULL,
                TIME_REVOKED    TIMESTAMP       NOT NULL,
                ORGANIZATION    VARCHAR(100),
                PRIMARY KEY (ENTITY_ID, ENTITY_TYPE, ORGANIZATION)
              )ENGINE INNODB;
              SQL
        {{ end }}
        - name: init-db-connector-download
          image: busybox:1.32
          command:
            - /bin/sh
            - "-c"
            - |
              set -e
              DEST="/db-connector-jar/mysql-connector-j.jar"
              for url in \
                "{{ .Values.wso2.deployment.am.db.driver_url }}" \
                "https://repo1.maven.org/maven2/com/mysql/mysql-connector-j/8.0.33/mysql-connector-j-8.0.33.jar" \
                "https://repo1.maven.org/maven2/mysql/mysql-connector-java/8.0.29/mysql-connector-java-8.0.29.jar"; do
                echo "Attempting connector download: ${url}"
                if wget --no-check-certificate -T 30 -t 3 -O "${DEST}" "${url}"; then
                  echo "MySQL connector downloaded to ${DEST}"
                  exit 0
                fi
              done
              echo "WARNING: Unable to download MySQL connector from configured fallback URLs"
              exit 1
          volumeMounts:
            - name: db-connector-jar
              mountPath: /db-connector-jar
      containers:
        - name: wso2am
{{- include "image" (dict "Values" .Values "deployment" .Values.wso2.deployment.am) | indent 10 }}
          imagePullPolicy: {{ .Values.wso2.deployment.am.imagePullPolicy }}
          livenessProbe:
            httpGet:
              path: /services/Version
              port: 9763
            initialDelaySeconds: {{ .Values.wso2.deployment.am.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.wso2.deployment.am.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /services/Version
              port: 9763
            initialDelaySeconds: {{ .Values.wso2.deployment.am.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.wso2.deployment.am.readinessProbe.periodSeconds }}
          lifecycle:
            preStop:
              exec:
                command:  ['sh', '-c', '${WSO2_SERVER_HOME}/bin/api-manager.sh stop']
          resources:
            requests:
              memory: {{ .Values.wso2.deployment.am.resources.requests.memory }}
              cpu: {{ .Values.wso2.deployment.am.resources.requests.cpu }}
            limits:
              memory: {{ .Values.wso2.deployment.am.resources.limits.memory }}
              cpu: {{ .Values.wso2.deployment.am.resources.limits.cpu }}
          securityContext:
            runAsUser: 802
          ports:
            - containerPort: 8280
              protocol: "TCP"
            - containerPort: 8243
              protocol: "TCP"
            - containerPort: 9099
              protocol: "TCP"
            - containerPort: 8099
              protocol: "TCP"
            - containerPort: 9763
              protocol: "TCP"
            - containerPort: 9443
              protocol: "TCP"
            - containerPort: 9711
              protocol: "TCP"
            - containerPort: 9611
              protocol: "TCP"
            - containerPort: 5672
              protocol: "TCP"
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: JVM_MEM_OPTS
              value: "-Xms{{ .Values.wso2.deployment.am.resources.jvm.heap.memory.xms }} -Xmx{{ .Values.wso2.deployment.am.resources.jvm.heap.memory.xmx }}"
          volumeMounts:
            - name: wso2am-conf
              mountPath: /home/wso2carbon/wso2-config-volume/repository/conf
            {{ if .Values.wso2.deployment.persistentRuntimeArtifacts.apacheSolrIndexing.enabled }}
            - name: wso2am-local-carbon-database-storage
              mountPath: /home/wso2carbon/solr/database
            - name: wso2am-solr-indexed-data-storage
              mountPath: /home/wso2carbon/solr/indexed-data
            - name: wso2am-conf-entrypoint
              mountPath: /home/wso2carbon/docker-entrypoint.sh
              subPath: docker-entrypoint.sh
            {{ end }}
            - name: db-connector-jar
              mountPath: /home/wso2carbon/wso2-artifact-volume/repository/components/lib
      serviceAccountName: {{ .Values.kubernetes.serviceAccount }}
      {{- if .Values.wso2.deployment.am.imagePullSecrets }}
      imagePullSecrets:
        - name: {{ .Values.wso2.deployment.am.imagePullSecrets }}
      {{- else if and (not (eq .Values.wso2.subscription.username "")) (not (eq .Values.wso2.subscription.password "")) }}
      imagePullSecrets:
        - name: {{ template "am-single-node.resource.prefix" . }}-wso2-private-registry-creds
      {{ end }}
      volumes:
        - name: wso2am-conf
          configMap:
            name: {{ template "am-single-node.resource.prefix" . }}-am-conf
        {{ if .Values.wso2.deployment.persistentRuntimeArtifacts.apacheSolrIndexing.enabled }}
        - name: wso2am-local-carbon-database-storage
          persistentVolumeClaim:
            claimName: {{ template "am-single-node.resource.prefix" . }}-am-local-carbon-database-volume-claim
        - name: wso2am-solr-indexed-data-storage
          persistentVolumeClaim:
            claimName: {{ template "am-single-node.resource.prefix" . }}-am-solr-indexed-data-volume-claim
        - name: wso2am-conf-entrypoint
          configMap:
            name: {{ template "am-single-node.resource.prefix" . }}-am-conf-entrypoint
            defaultMode: 0407
        {{ end }}
        - name: db-connector-jar
          emptyDir: {}
